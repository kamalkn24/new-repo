name: "JFrog Python Example"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  actions: read
  security-events: write

env:
  BUILD_NAME: "JFrog-Scan-Example-Build"
  BUILD_NUMBER: "${{ github.run_number }}"

jobs:
  build-scan:
    runs-on: ubuntu-latest
    environment: frogbot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      # Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            python3-dev \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev \
            libjpeg-dev \
            libtiff-dev \
            libfreetype6-dev \
            liblcms2-dev \
            libwebp-dev \
            libopenjp2-7-dev \
            tcl8.6-dev tk8.6-dev

      # Setup JFrog CLI
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      # Configure pip (GLOBAL + RELIABLE)
      - name: Configure pip
        run: |
          jf pip-config \
            --repo-resolve=sws-jf-example-python-remote \
            --server-id-resolve=setup-jfrog-cli-server

          # Improve reliability
          pip config set global.timeout 120
          pip config set global.retries 10
          pip config set global.extra-index-url https://pypi.org/simple

      # Preinstall build tools (IMPORTANT FIX)
      - name: Preinstall build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # Install dependencies
      - name: Install Python Dependencies
        run: |
          jf pip install build --retries 10

          jf pip install -r requirements.txt \
            --build-name $BUILD_NAME \
            --build-number $BUILD_NUMBER \
            --project=jf-example \
            --retries 10

      # Build package
      - name: Build artifact
        run: |
          python -m build

      # Upload artifacts and build info
      - name: Upload artifact and build info
        run: |
          jf rt bce $BUILD_NAME $BUILD_NUMBER --project=jf-example

          jf rt upload "dist/*" "sws-jf-example-python-local" \
            --build-name $BUILD_NAME \
            --build-number $BUILD_NUMBER \
            --project=jf-example

          jf rt bad $BUILD_NAME $BUILD_NUMBER requirements.txt --project=jf-example

          jf rt bp $BUILD_NAME $BUILD_NUMBER --project=jf-example

      # Xray build scan
      - name: Run Xray scan
        run: |
          jf build-scan $BUILD_NAME $BUILD_NUMBER \
            --format=sarif \
            --project=jf-example > jfrog_scan_results.sarif

      # ✅ FIXED: Dependency audit (with timeout + fallback)
      - name: Xray dependency audit
        run: |
          export PIP_DEFAULT_TIMEOUT=120
          export PIP_RETRIES=10
          export PIP_EXTRA_INDEX_URL=https://pypi.org/simple

          # Ensure build deps exist (prevents re-download issues)
          pip install --upgrade setuptools wheel

          jf audit --format=sarif > jfrog_audit_results.sarif
